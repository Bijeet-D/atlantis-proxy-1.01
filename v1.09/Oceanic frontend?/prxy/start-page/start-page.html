<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <svg>
        <filter id="filter" color-interpolation-filters="sRGB" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse">
	<feGaussianBlur stdDeviation="10 10" x="10%" y="10%" width="100%" height="100%" in="morphology" edgeMode="none" result="blur"/>
</filter>
    </svg>
    <main class="abs-center">
        <h1 >Atlantis</h1>
        <input type="color">
        <input type="text" id="sj-input" placeholder="Atlantis - Search The Web Freely">
        <div class="f-break"></div>
        <div class="a-r" style="width: 90%; visibility: hidden;">
            <div class="editBtn">
                <p>edit</p>
            </div>
        </div>

        <div class="shortcuts">

            <div class="outerShortcut" data-href="crazygames.com">

                <div class="edit-popup-shortcut" style="display: none;"> 
                    <button class="edit-shortcut">
                        Edit
                    </button>
                    <button class="trash-shortcut">Delete</button>
                </div>

                <div class="shortcut">
                <img src="https://www.google.com/s2/favicons?domain=https://crazygames.com&sz=128" alt="" srcset="">    
                <img src="icons/treeDot.svg" alt="" class="tree-dots-shortcuts">

                <p>CrazyGames</p>
            </div>
            </div>
            

           

            <div class="shortcut new-shortcut">
                <img src="./icons/plus-shortcut.svg" alt="" style="filter: invert(1);">
                <p>New</p>
            </div>
        </div>

        
            
        </div>
    </main>

    <div class="editShortcutPopup abs-center" style="transform: translate(-50%,-50%); display: none;">
        <div>
            <p>Name</p>
            <input type="text" class="shortcut-name">
        </div>

        <div>
            <p>Url</p>
            <input type="text" class="shortcut-url">
        </div>

        
        <div class="spacer" style="margin: 15px 0px"></div>
        <hr style="width: 30%;">
        <div class="spacer" style="margin: 15px 0px"></div>
            <div class="save-stuff">
                <button class="save">Save</button>
                <button class="cancel">Cancel</button>
            </div>
            
    </div>
    </div>

        <style>
            * {
                box-sizing: border-box;
            }

            :root {
                --shortcutBgClr: rgba(182, 225, 255, 0.575);
            }


            html, body {
                /*background-color: rgba(0, 0, 0, 0.11);
                backdrop-filter: blur(15px);*/
                margin: 0px;
                padding: 0px;
                width: 100vw;
                height: 100vh;
                color: aliceblue;
            }  


            body::before {
    content: '';
    position: fixed;
    inset: 0;
    backdrop-filter: blur(100px) brightness(130%);
    z-index: -1;
}

            .abs-center {  
                position: absolute;
                top: 50%; 
                left: 50%;
                transform: translate(-50%, -30%);
            }

            .editShortcutPopup {
                background-color: rgba(255, 255, 255, 0.041) !important;
                backdrop-filter: blur(80px) brightness(90%);
                border: 2px solid rgba(255, 255, 255, 0.402);
                border-radius: 10px;
                padding: 20px;
                zoom: 80%;

                .save-stuff {
                    box-sizing: border-box;
                    padding: 5px;
                    padding-top: 10px;
                    width: 100%;
                    display: flex;
                    justify-content: end;
                }

                div {
                    display: flex; 
                    justify-content: space-between;
                    margin: 30px 0px;
                    padding: 0px 40px;
                }

                div p {
                    display: flex; 
                    align-self: center; 
                    padding: 0px; 
                    margin: 0px;
                    font-size: 20px;
                    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
                }

                .save {
                    width: 200px;
                    height: 40px;
                    border-radius: 10px;
                    border: 2px solid rgba(255, 255, 255, 0.45);
                    background-color: rgba(0, 213, 255, 0.278);
                    color: white;
                    cursor: pointer;
                    margin-top: 20px;
                    margin: 10px;
                }  


                .cancel {
                    width: 200px;
                    height: 40px;
                    border-radius: 10px;
                    border: 2px solid rgba(255, 255, 255, 0.45);
                    background-color: rgba(129, 200, 214, 0.278);
                    color: white;
                    cursor: pointer;
                    margin-top: 20px;
                    margin: 10px;
                }

                input {
                    width: 200px;   
                    height: 30px;
                    border: none;
                    border-radius: 20px;
                    padding: 0px 10px;
                    background-color: rgba(79, 162, 200, 0.863);
                    color: aliceblue;
                    font-weight: 700;
                    text-align: center;
                }
            }


            main {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                width: 40%;
                transform: translateY(-100%);

                h1 {
                    width: 90%;
                    text-align: center;
                    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
                }

                input {
                    text-align: center;
                    color: aliceblue;
                    font-size: 1.3rem;
                }

                input::placeholder {
                    font-size: 1rem;
                    color: rgba(198, 216, 231, 0.679);
                }
            }

            
                .a-r {
                    width: 100%;
                    display: flex;
                    justify-content: end;
                }

                .outerShortcut {
                    position: relative;
                    width: fit-content;
                    height: fit-content;
                }

.shortcuts {
    position: relative;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;


    /*
    scrollbar-width: thin;
    scrollbar-color: #ffffff4e transparent; /* thumb | track */
    
    transition: 0.3s ease;
    /*border-left: 2px solid rgba(255, 255, 255, 0.51);
    border-right: 2px solid rgba(255, 255, 255, 0.51);
    */

    border-radius: 20px;
    corner-shape: notch;
    margin-top: 3px;
    box-sizing: border-box;
}
/*
.shortcuts::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0px;
    left: 0px;
    border: 2px solid white;
}
    */

#sj-input {
    width: 90%;
    height: 50px;
    background-color: rgba(255, 255, 255, 0.214);
    border: 2px solid rgb(209, 227, 243);
    border-radius: 10px;
}

.shortcuts::-webkit-scrollbar {
    width: 0px;
}

.shortcuts::-webkit-scrollbar-track {
    margin-top: 10px;
    background: transparent;
}

.shortcuts::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 4px;
}

            .shortcut {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                margin: 7px;
                width: 87px;
                height: 100px;
                border-radius: 10px;
                justify-content: center;    
                cursor: pointer;
                background-color: rgba(255, 255, 255, 0.126);
                transition: transform 0.2s ease;
                border: 2px solid var(--shortcutBgClr);
            }   



            .shortcut:hover {
                transform: translateY(-3px) scale(1.01);
                background-color: rgba(255, 255, 255, 0.191);

            }

            .shortcut img {
                display: block;
                width: 50px;
                height: 50px;
                object-fit: cover;  
                margin: 0px;    
                margin-top: 7px;
                margin-bottom: auto;
                border-radius: 10px;
                
            }       

            .shortcut p {
                flex-wrap: wrap;
                text-align: center;
                align-items: center;
                justify-content: center;
                font-family: Arial, Helvetica, sans-serif; 
                font-weight: 600;
                margin: 0px;
                margin-top: clamp(8px, 10px, 40px);
                margin-bottom: clamp(4px, 10px, 10px);
                font-size: clamp(12px, 1.5ch, 24px); 
                text-wrap: wrap;
                padding-left: 5px;
                padding-right: 5px;
                width: 100%;
                box-sizing: border-box;
                height: fit-content;
            }

            .tree-dots-shortcuts {
                position: absolute;
                top: 3px;
                right: 3px;
                width: 10px !important;
                height: 20px !important;
                filter: invert(1);
            }

            .tree-dots-shortcuts:hover {
                background-color: rgba(0, 0, 0, 0.166); /*acually white cuz invert(1) on dots*/
                z-index: 100;
            }   


            .edit-popup-shortcut {
                position: absolute;
                z-index: 100000 !important;
                top: 5px;
                right: 0px;
                display: flex;
                flex-wrap: wrap;
                height: 60px;
                width: 120px;
                background-color: rgba(0, 0, 0, 0);
                border-radius: 15px;
                overflow: hidden;
                opacity: 0;
                transition: opacity 0.1s ease;
                transform: translateX(100%);
            }

            .edit-popup-shortcut button{
                height: 50%;
                width: 100%;
                backdrop-filter: blur(100px) brightness(130%);
                background-color: rgb(57, 130, 179);
                border: none;
                color: rgb(230, 246, 255);
                font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
                z-index: 100;
                transition: 0.1s ease;
                cursor: pointer;
            }

            .edit-popup-shortcut button:hover {
                background-color: rgb(74, 145, 192);
                color: white;
            }

            .f-break {
                height: 0px;
                flex-basis: 100%;
            }

            .top-scrolled {
                mask-image: linear-gradient(
    to top,
    transparent 0%,
    black 12%
  );
            }

            .bottom-scrolled {
                                mask-image: linear-gradient(
    to bottom,
    transparent 0%,
    black 12%
  );
            }


            .editBtn {
                margin-top: 7px;
                position: relative;
                backdrop-filter: blur(3px) brightness(120%);
                background-color: rgba(167, 207, 243, 0.237);
                width: 50px;
                height: 20px;
                border-radius: 20px;
                font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                cursor: pointer;
            }

            .editBtn p {
                color: aliceblue;
                margin: 0px;
                padding: 0px;
                width: 100%;
                height: 100%;
                text-align: center;
            }

            .showF {
                display: flex !important;
                opacity: 1;
            }
        </style>  
        
        <script src="./script.js">
            
        </script>
</body>
</html>
